{% extends "base.html" %}

{% block title %}Delete {{ item.name }}{% endblock %}

{% block extra_head %}
<style>
.item-delete-container {
    max-width: 420px;
    margin: 2.5em auto;
    background: #fff3cd;
    padding: 2.5em 2em;
    border-radius: 12px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
}
.item-delete-title {
    margin-bottom: 1.2em;
    color: #856404;
    font-size: 1.3em;
    font-weight: 700;
}
.item-delete-desc {
    margin-bottom: 2.2em;
    color: #856404;
}
.item-delete-actions {
    display: flex;
    gap: 1em;
}
.item-delete-confirm {
    padding: 0.6em 2em;
    background: #e63946;
    color: #fff;
    border: none;
    border-radius: 5px;
    font-weight: 600;
    font-size: 1em;
}
.item-delete-cancel {
    padding: 0.6em 1.5em;
    background: #f1f3f5;
    color: #6c757d;
    border-radius: 5px;
    text-decoration: none;
    font-weight: 500;
    border: 1px solid #dee2e6;
}
</style>
{% endblock %}

{% block content %}
<div class="item-delete-container">
    <h2 class="item-delete-title">Delete "{{ item.name }}"?</h2>
    <p class="item-delete-desc">Are you sure you want to delete this item?</p>
    <form method="post" class="item-delete-actions">
        {% csrf_token %}
        <button type="submit" class="item-delete-confirm">Yes, delete</button>
        <a href="{% url 'item_list' %}" class="item-delete-cancel">Cancel</a>
    </form>
</div>
{% endblock %}
