{% extends "base.html" %}

{% block title %}{{ item.name|default:"Create Item" }}{% endblock %}

{% block extra_head %}
<style>
.item-form-container {
    max-width: 420px;
    margin: 2.5em auto;
    background: #fff;
    padding: 2.5em 2em;
    border-radius: 12px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
}
.item-form-title {
    margin-bottom: 1.2em;
    font-size: 1.5em;
    font-weight: 700;
    color: #22223b;
}
.item-form-fields {
    margin-bottom: 1.5em;
}
.item-form-actions {
    display: flex;
    justify-content: flex-end;
    gap: 1em;
}
.item-form-save {
    padding: 0.6em 2em;
    background: linear-gradient(90deg, #007bff 60%, #0056b3 100%);
    color: #fff;
    border: none;
    border-radius: 5px;
    font-weight: 600;
    font-size: 1em;
    box-shadow: 0 2px 8px rgba(0,123,255,0.08);
    transition: background 0.2s;
}
.item-form-cancel {
    padding: 0.6em 1.5em;
    background: #f1f3f5;
    color: #6c757d;
    border-radius: 5px;
    text-decoration: none;
    font-weight: 500;
    border: 1px solid #dee2e6;
}
</style>
{% endblock %}

{% block content %}
<div class="item-form-container">
    <h2 class="item-form-title">{{ item.name|default:"Create Item" }}</h2>
    <form method="post">
        {% csrf_token %}
        <div class="item-form-fields">
            {{ form.as_p }}
        </div>
        <div class="item-form-actions">
            <button type="submit" class="item-form-save">Save</button>
            <a href="{% url 'item_list' %}" class="item-form-cancel">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
